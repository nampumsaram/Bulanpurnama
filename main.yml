name: Moon Tracker Selayang

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # Jalan setiap jam

jobs:
  track-moon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests skyfield

      - name: Run Moon Tracker
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python -c "
          from skyfield.api import load, wgs84
          from datetime import timedelta
          import requests
          import os

          # Koordinat Selayang
          selayang = wgs84.latlon(3.2350616, 101.6605195)

          # Load data ephemeris
          load.download('de440.bsp')
          eph = load('de440.bsp')
          earth, moon = eph['earth'], eph['moon']

          # Kira waktu (UTC + 8 jam)
          ts = load.timescale()
          now_utc = ts.now()
          now_myt = now_utc + timedelta(hours=8)
          
          # Kira posisi
          observer = earth + selayang
          astrometric = observer.at(now_utc).observe(moon)
          alt, az, distance = astrometric.apparent().altaz()

          # Data untuk Discord Embed
          embed = {
              'title': '🌕 Status Bulan di Selayang',
              'color': 3447003, # Warna biru
              'fields': [
                  {'name': 'Waktu (MYT)', 'value': now_myt.utc_strftime('%Y-%m-%d %H:%M:%S'), 'inline': False},
                  {'name': 'Altitude', 'value': f'{alt.degrees:.2f}°', 'inline': True},
                  {'name': 'Azimuth', 'value': f'{az.degrees:.2f}°', 'inline': True},
                  {'name': 'Jarak', 'value': f'{distance.km:,.0f} km', 'inline': False}
              ],
              'footer': {'text': 'Data dari NASA JPL DE440'}
          }

          # Hantar ke Discord
          requests.post(os.environ['WEBHOOK_URL'], json={'embeds': [embed]})
          "
